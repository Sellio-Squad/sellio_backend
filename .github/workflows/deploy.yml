name: Deploy to Server

on:
  workflow_run:
    workflows: ["Build & Push Image"]
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest image
        run: docker pull kafo9991/sellio-app:latest

      - name: Restart containers
        run: |
          cd ~/sellio_backend
          docker compose down
          docker compose up -d
